name: Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run checks
        run: npm run check
