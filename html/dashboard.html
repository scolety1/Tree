<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account | Family Tree</title>
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/global.css?v=20260522-11">
</head>
<body class="is-auth-loading">

    <header>
        <h1><a id="brandHomeLink" class="brand-link" href="/">Family tree</a></h1>
        <nav aria-label="Main">
            <ul class="nav">
                <li class="home-nav-item"><a href="/">Home</a></li>
                <li><a id="treeNavLink" href="/tree">Example Tree</a></li>
            </ul>
        </nav>
        <div class="account-area">
            <p id="authStatus" class="auth-status">Checking sign-in...</p>
            <a id="authLink" class="account-link" href="/signin" aria-label="Sign in" hidden>
                <span class="account-icon" aria-hidden="true"></span>
                <span class="account-link-text">Sign In</span>
            </a>
        </div>
    </header>

    <main>
        <section class="dashboard-hero">
            <div>
                <h2>Account</h2>
                <p id="accountEmail" aria-live="polite">Manage your sign-in and family tree access.</p>
            </div>
            <div class="dashboard-actions">
                <button id="signOutBtn" class="button button-secondary" type="button" aria-describedby="accountEmail" hidden>Sign Out</button>
            </div>
        </section>

        <section class="dashboard-section">
            <div class="section-heading">
                <h2>Your family tree</h2>
                <p>This tree is private. Share the access code only with relatives you want to invite.</p>
            </div>
            <div id="dashboardStatus" class="dashboard-status" role="status" aria-live="polite">
                Loading your family tree...
            </div>
            <div id="familyTreeList" class="family-tree-list" aria-label="Family tree account list" aria-live="polite"></div>
        </section>

    </main>

    <footer>
        <small>Copyright &copy; <span id="year"></span> Family Tree App</small>
    </footer>

    <script type="module" src="/js/main.js?v=20260522-11"></script>
</body>
</html>
