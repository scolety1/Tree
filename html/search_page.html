<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Family Tree</title>
    <link rel="stylesheet" href="/css/global.css">
</head>
<body>

    <header>
        <h1>Family tree</h1>
        <nav aria-label="Main">
            <ul class="nav">
                <li><a href="/">Home</a></li>
                <li><a href="/tree">Family Tree</a></li>
                <li><a href="/search">Search</a></li>
                <li><a id="authLink" href="/signin">Sign In</a></li>
            </ul>
        </nav>
        <p id="authStatus" class="auth-status">Checking sign-in...</p>
        <button id="signOutBtn" class="auth-sign-out" hidden>Sign Out</button>
    </header>


    <main>
        <section class="search-section">
            <h2>Search the family tree</h2>

            <form id="search-form">
                <label for="search-input">Search by name</label>
                <input
                    id="search-input"
                    type="text"
                    placeholder="Enter a first or last name..."
                    autocomplete="off"
                />
                <button type="submit">Search</button>
            </form>

            <div id="search-results" class="search-results">
                <p>Type a name above to search.</p>
            </div>
        </section>
        
        <button id="addPersonBtn" title="Add Person">+</button>

        <div id="addModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Add a New Family Member</h2>
                <p id="addPersonStatus" class="form-status" aria-live="polite"></p>
                <form id="addPersonForm">
                    <input type="text" id="firstName" placeholder="Enter First Name" aria-label="First name" required><br>
                    <input type="text" id="middleInitial" placeholder="Enter Middle Initial" aria-label="Middle initial"><br>
                    <input type="text" id="lastName" placeholder="Enter Last Name" aria-label="Last name" required><br>
                    <input type="date" id="birthDate" placeholder="Enter Birthdate" aria-label="Birthdate"><br>
                    <select id="parent1" aria-label="First parent">
                        <option value="">Select First Parent</option>
                    </select><br>
                    <select id="parent2" aria-label="Second parent">
                        <option value="">Select Second Parent</option>
                    </select><br>
                    <select id="spouse" aria-label="Spouse">
                        <option value="">Select Spouse</option>
                    </select><br>
                    <button type="submit">Add</button>
                </form>
            </div>
        </div>
    </main>

        
    <footer>
        <small>Copyright &copy; <span id="year"></span> Family Tree App</small>
    </footer>
    
    <script type="module" src="/js/main.js"></script>
</body>
</html>
