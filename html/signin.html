<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Family Tree</title>
    <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/global.css?v=20260610-12">
</head>
<body class="is-auth-loading">

    <header>
        <h1><a id="brandHomeLink" class="brand-link" href="/">Family tree</a></h1>
        <nav aria-label="Main">
            <ul class="nav">
                <li class="home-nav-item"><a href="/">Home</a></li>
                <li><a id="treeNavLink" href="/tree">Example Tree</a></li>
            </ul>
        </nav>
        <div class="account-area">
            <p id="authStatus" class="auth-status">Checking sign-in...</p>
            <a id="authLink" class="account-link" href="/signin" aria-label="Sign in" hidden>
                <span class="account-icon" aria-hidden="true"></span>
                <span class="account-link-text">Sign In</span>
            </a>
        </div>
    </header>

    <main>
        <section class="auth-panel">
            <h2 id="authTitle">Sign In</h2>
            <p id="authIntro">
                Browse the example tree without signing in. Sign in when you want to create, edit, or share a private family tree.
            </p>

            <p id="authFormStatus" class="form-status" role="status" aria-live="polite"></p>

            <form id="authForm" aria-labelledby="authTitle" aria-describedby="authFormStatus" novalidate>
                <label for="authEmail">Email</label>
                <input id="authEmail" type="email" autocomplete="email" required>

                <div id="authPasswordGroup" class="auth-field-group">
                    <label for="authPassword">Password</label>
                    <input id="authPassword" type="password" autocomplete="current-password" required>
                </div>

                <button id="authSubmitBtn" type="submit">Sign In</button>
            </form>

            <button id="googleSignInBtn" class="button auth-secondary-button" type="button" aria-describedby="authFormStatus">
                Continue with Google
            </button>

            <div class="auth-actions">
                <button id="authModeToggle" type="button" aria-controls="authTitle authSubmitBtn" aria-pressed="false">New here? Create an account</button>
                <button id="resetPasswordBtn" type="button" aria-describedby="authFormStatus">Reset password</button>
                <button id="authResetBackBtn" type="button" aria-controls="authTitle authSubmitBtn" hidden>Back to sign in</button>
            </div>
        </section>
    </main>

    <footer>
        <small>Copyright &copy; <span id="year"></span> Family Tree</small>
    </footer>

    <script type="module" src="/js/main.js?v=20260610-12"></script>
</body>
</html>
