<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Profile</title>
  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/profile.css">


</head>
<body>
  <header>
    <h1>Family tree</h1>
    <nav aria-label="Main">
      <ul class="nav">
        <li><a href="/">Home</a></li>
        <li><a href="/tree">Family Tree</a></li>
        <li><a href="/search">Search</a></li>
        <li><a id="authLink" href="/signin">Sign In</a></li>
      </ul>
    </nav>
    <p id="authStatus" class="auth-status">Checking sign-in...</p>
    <button id="signOutBtn" class="auth-sign-out" hidden>Sign Out</button>
  </header>

  <div class="profile-page">
    <section class="profile-card" id="profileCard">
      <!-- LEFT: PHOTO -->
      <div class="profile-photo-wrapper">
        <img id="profileImage" class="profile-image" alt="Profile picture" />
      </div>

      <!-- RIGHT: DETAILS -->
      <div class="profile-details">
        <h1 id="name">Loading...</h1>
        <p id="profileStatus" class="form-status profile-status" aria-live="polite"></p>

        <p class="profileInfo">
          <strong>Birth Day: </strong>
          <span id="birthDate"></span>
        </p>

        <p class="profileInfo">
          <strong>Parents: </strong>
          <span id="parents"></span>
        </p>

        <p class="profileInfo">
          <strong>Spouse: </strong>
          <span id="spouse"></span>
        </p>

        <p class="profileInfo">
          <strong>Children: </strong>
          <span id="children"></span>
        </p>

        <p class="profileInfo">
          <strong>Bio: </strong>
          <span id="bio"></span>
        </p>

        <p class="profileInfo">
          <strong>Fun Fact (from their birthday): </strong>
          <span id="funFact">Loading...</span>
        </p>

        <div class="profile-buttons">
          <a id="profileBackLink" href="/tree" class="button profile-btn secondary">
            Back to Family Tree
          </a>
          <button id="deletePersonBtn" class="button profile-btn danger">
            Remove This Person
          </button>
          <button id="editPersonBtn" class="button profile-btn primary">
            Edit This Person
          </button>
        </div>
      </div>
    </section>
  </div>

  <div id="editPersonModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Edit Person</h2>
      <form id="editPersonForm" enctype="multipart/form-data">
        <label class="form-label">
          First Name
          <input type="text" id="editFirstName" required><br>
        </label>
        <label class="form-label">
          Middle Initial
          <input type="text" id="editMiddleInitial"><br>
        </label>
        <label class="form-label">
          Last Name
          <input type="text" id="editLastName" required><br>
        </label>
        <label class="form-label">
          Person's Birthday
          <input type="date" id="editBirthDate"><br>
        </label>
        <label class="form-label">
          Parent One
          <select id="editParent1">
            <option value="">Select Parent 1</option>
          </select><br>
        </label>
        <label class="form-label">
          Parent Two
          <select id="editParent2">
            <option value="">Select Parent 2</option>
          </select><br>
        </label>
        <label class="form-label">
          Spouse
          <select id="editSpouse">
            <option value="">Select Spouse</option>
          </select><br>
        </label>
        <label class="form-label">
          Bio
          <textarea id="editBio" placeholder="Add a Bio" rows="4"></textarea><br>
        </label>
        <label class="form-label">
          Profile Image
          <input type="file" id="editImageFile" accept="image/*"><br>
        </label>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <footer>
    <small>Copyright &copy; <span id="year"></span> Family Tree App</small>
  </footer>

  <script type="module" src="/js/main.js"></script>
  <script type="module" src="/js/profile.js"></script>
</body>

</html>
