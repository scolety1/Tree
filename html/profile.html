<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Profile</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/css/global.css?v=20260521-7">
    <link rel="stylesheet" href="/css/profile.css?v=20260521-7">


</head>
<body>
  <header>
    <h1>Family tree</h1>
    <nav aria-label="Main">
      <ul class="nav">
        <li><a id="treeNavLink" href="/tree">Example Tree</a></li>
        <li><a id="searchNavLink" href="/search">Search</a></li>
      </ul>
    </nav>
    <div class="account-area">
      <p id="authStatus" class="auth-status">Checking sign-in...</p>
      <a id="authLink" class="account-link" href="/signin" aria-label="Sign in">
        <span class="account-icon" aria-hidden="true"></span>
        <span class="account-link-text">Sign In</span>
      </a>
    </div>
  </header>

  <div class="profile-page">
    <section class="profile-card" id="profileCard">
      <!-- LEFT: PHOTO -->
      <div class="profile-photo-wrapper">
        <img id="profileImage" class="profile-image" alt="Profile picture" />
      </div>

      <!-- RIGHT: DETAILS -->
      <div class="profile-details">
        <h1 id="name">Loading...</h1>
        <p id="profileStatus" class="form-status profile-status" aria-live="polite"></p>
        <p id="profileEditState" class="profile-edit-state">Checking edit access...</p>

        <p class="profileInfo">
          <strong>Birthday: </strong>
          <span id="birthDate"></span>
        </p>

        <p class="profileInfo">
          <strong>Parents: </strong>
          <span id="parents"></span>
        </p>

        <p class="profileInfo">
          <strong>Spouse: </strong>
          <span id="spouse"></span>
        </p>

        <p class="profileInfo">
          <strong>Children: </strong>
          <span id="children"></span>
        </p>

        <p class="profileInfo">
          <strong>Bio: </strong>
          <span id="bio"></span>
        </p>

        <p class="profileInfo">
          <strong>Birthday fun fact: </strong>
          <span id="funFact">Loading...</span>
        </p>

        <div class="profile-buttons">
          <a id="profileBackLink" href="/tree" class="button profile-btn secondary">
            Back to Family Tree
          </a>
          <button id="deletePersonBtn" class="button profile-btn danger" hidden>
            Remove This Person
          </button>
          <button id="editPersonBtn" class="button profile-btn primary" hidden>
            Edit Profile
          </button>
        </div>
      </div>
    </section>
  </div>

  <div id="editPersonModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Edit Profile</h2>
      <form id="editPersonForm" enctype="multipart/form-data">
        <label class="form-label">
          First Name
          <input type="text" id="editFirstName" required><br>
        </label>
        <label class="form-label">
          Middle Initial
          <input type="text" id="editMiddleInitial"><br>
        </label>
        <label class="form-label">
          Last Name
          <input type="text" id="editLastName" required><br>
        </label>
        <label class="form-label">
          Person's Birthday
          <input type="date" id="editBirthDate"><br>
        </label>
        <label class="form-label">
          Parent one
          <select id="editParent1">
            <option value="">Select Parent 1</option>
          </select><br>
        </label>
        <label class="form-label">
          Parent two
          <select id="editParent2">
            <option value="">Select Parent 2</option>
          </select><br>
        </label>
        <label class="form-label">
          Spouse
          <select id="editSpouse">
            <option value="">Select Spouse</option>
          </select><br>
        </label>
        <label class="form-label">
          Bio
          <textarea id="editBio" placeholder="Add a short note, memory, or context..." rows="4"></textarea><br>
        </label>
        <label class="form-label">
          Photo URL
          <input type="url" id="editImageUrl" placeholder="https://example.com/photo.jpg"><br>
        </label>
        <label class="form-label">
          Upload profile photo
          <input type="file" id="editImageFile" accept="image/*"><br>
        </label>
        <label class="form-label checkbox-label">
          <input type="checkbox" id="removeImage">
          Remove current photo
        </label>
        <button type="submit">Save</button>
      </form>
    </div>
  </div>

  <footer>
    <small>Copyright &copy; <span id="year"></span> Family Tree App</small>
  </footer>

  <script type="module" src="/js/main.js?v=20260521-7"></script>
  <script type="module" src="/js/profile.js?v=20260521-7"></script>
</body>

</html>
